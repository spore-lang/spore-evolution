name: "CI - PR Checks"

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  title:
    name: PR title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check PR title
        uses: zrr1999/zendev-actions/validate-title@9013ad848b32d287d0258fdbc9f51e350b8eca33
        with:
          text: ${{ github.event.pull_request.title }}

  body:
    name: PR body
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          MERGE_BASE=$(git merge-base "$BASE" "$HEAD" 2>/dev/null || echo "$BASE")
          CHANGED=$(git diff --name-only "$MERGE_BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED" | grep -qE '^(seps|drafts)/'; then
            echo "is_sep=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_sep=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate PR body checklist (SEP PRs only)
        if: steps.changes.outputs.is_sep == 'true'
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          REQUIRED_CHECKBOXES = [
              "- [x] I opened or linked a public Discussion or Issue for the pitch before submitting this draft SEP.",
              "- [x] I linked the canonical discussion thread.",
              "- [x] I used the correct SEP template for this proposal type.",
              "- [x] I updated front matter metadata and required sections.",
          ]

          payload = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text(encoding="utf-8"))
          body = (payload.get("pull_request") or {}).get("body") or ""
          missing = [item for item in REQUIRED_CHECKBOXES if item not in body]

          if missing:
              print("Pull request body is missing required checked items:\n", file=sys.stderr)
              for item in missing:
                  print(f"- {item}", file=sys.stderr)
              raise SystemExit(1)

          print("Pull request body checklist looks good.")
          PY

      - name: PR body OK (non-SEP PR)
        if: steps.changes.outputs.is_sep == 'false'
        run: echo "Non-SEP PR — body checklist not required."
