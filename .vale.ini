StylesPath = .github/styles
MinAlertLevel = warning
Vocab = Spore

[*.md]
BasedOnStyles = Vale, Google, alex, write-good, Spore
Vale.Spelling = NO

# Google is the primary baseline, but a few rules are too noisy for specs.
Google.Acronyms = NO
Google.EmDash = NO
Google.FirstPerson = NO
Google.Latin = NO
Google.LyHyphens = NO
Google.Ordinal = NO
Google.Quotes = NO
Google.Spacing = NO
Google.Units = NO
Google.We = NO
Google.Will = NO

# alex defines the inclusivity floor.
alex = warning
alex.Condescending = NO
alex.ProfanityUnlikely = NO

# Keep write-good intentionally low-noise.
write-good.Cliches = NO
write-good.E-Prime = NO
write-good.Illusions = NO
write-good.Passive = NO
write-good.So = NO
write-good.ThereIs = NO
write-good.TooWordy = warning
write-good.Weasel = warning

# Project-specific terminology and identifier rules are always on.
Spore.Terms = error
Spore.Identifiers = warning

# SEP-only rules stay scoped to proposal documents.
Spore.SectionHeadings = NO
Spore.NormativeKeywords = NO

[seps/**/*.md]
BasedOnStyles = Vale, Google, alex, write-good, Spore
Spore.SectionHeadings = warning
Spore.NormativeKeywords = suggestion

[drafts/**/*.md]
BasedOnStyles = Vale, Google, alex, write-good, Spore
Spore.SectionHeadings = warning
Spore.NormativeKeywords = suggestion
