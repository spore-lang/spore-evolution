StylesPath = .github/styles
MinAlertLevel = error
Vocab = Spore

[*.md]
BasedOnStyles = Vale, Google, alex, write-good, Spore
Vale.Spelling = NO

# Google is the primary baseline, but prose-only style rules stay off unless they
# consistently improve SEP quality in this repository.
Google.Acronyms = NO
Google.Colons = NO
Google.EmDash = NO
Google.FirstPerson = NO
Google.Headings = NO
Google.Latin = NO
Google.LyHyphens = NO
Google.Ordinal = NO
Google.Quotes = NO
Google.Spacing = NO
Google.Spelling = NO
Google.Units = NO
Google.We = NO
Google.Will = NO
Google.WordList = NO

# alex defines the inclusivity floor.
alex = error
alex.Ablist = NO
alex.Condescending = NO
alex.ProfanityUnlikely = NO
alex.Race = NO

# write-good remains disabled unless a rule proves reliably actionable on SEP prose.
write-good.Cliches = NO
write-good.E-Prime = NO
write-good.Illusions = NO
write-good.Passive = NO
write-good.So = NO
write-good.ThereIs = NO
write-good.TooWordy = NO
write-good.Weasel = NO

# Project-specific terminology and identifier rules are always on.
Spore.Terms = error
Spore.Identifiers = error

# SEP-only rules stay scoped to proposal documents.
Spore.SectionHeadings = NO
Spore.NormativeKeywords = NO

[seps/**/*.md]
BasedOnStyles = Vale, Google, alex, write-good, Spore
Spore.SectionHeadings = error
Spore.NormativeKeywords = suggestion

[drafts/**/*.md]
BasedOnStyles = Vale, Google, alex, write-good, Spore
Spore.SectionHeadings = error
Spore.NormativeKeywords = suggestion
